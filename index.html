<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulario</title>

<style>
/* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

        /* Alinha o checkbox com o texto */
.field-group label {
            display: flex;         /* deixa checkbox + texto na mesma linha */
            align-items: center;   /* centraliza verticalmente */
            gap: 6px;              /* espaço entre checkbox e texto */
            margin-bottom: 8px;    /* espaço entre linhas */
            cursor: pointer;       /* deixa o cursor de mão ao passar */
        }

.field-group input[type="checkbox"] {
            width: auto;           /* evita esticar o checkbox */
            vertical-align: middle;
        }

/* Fundo */
body {
    background: #f4f6f9;
}

/* Header */
.dashboard {
    background: #4a90e2;
    color: white;
    padding: 20px;
    text-align: center;
}

/* Form container */
.formulario_usuario {
    max-width: 700px;
    background: white;
    margin: 30px auto;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Campos */
.field-group {
    margin-bottom: 15px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

/* Inputs */
input, select, textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
    border-color: #4a90e2;
    outline: none;
}

/* Radios */
.radio-group {
    display: flex;
    gap: 15px;
}

.radio-item {
    display: flex;
    align-items: center;
    gap: 5px;
}

/* Range */
input[type="range"] {
    width: 100%;
}

/* Botões */
.btn-submit {
    background: #4a90e2;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-right: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-submit:hover {
    background: #357abd;
}

/* Botões secundários */
.btn-clear {
    background: #f39c12;
}

.btn-delete {
    background: #e74c3c;
}
</style>

</head>

<body>

<div class="dashboard">
    <h1>Live DEMO FORM</h1>
</div>

<div class="formulario_usuario">
    <form>

        <div class="field-group">
            <label>Course</label>
            <select>
                <option>select a Course</option>
                <option>web-developement</option>
                <option>data-science</option>
                <option>UX-design</option>
                <option>cybersecurity</option>
            </select>
        </div>

        <br>
        <div class="field-group">
            <label>Experience Level</label>
            <div class="radio-group">
                <div class="radio-item"><input type="radio" name="dept"> BEGGINER</div>
                <div class="radio-item"><input type="radio" name="dept"> INTERMEDIATE</div>
                <div class="radio-item"><input type="radio" name="dept"> ADVANCED</div>
            </div>
        </div>

        <div class="field-group">
            <label>Nome</label>
            <input type="text" placeholder="Seu nome completo">
        </div>

        <div class="field-group">
            <label>E-mail</label>
            <input type="email" placeholder="exemplo@empresa.com">
        </div>

        <div class="field-group">
            <label>Password</label>
            <input type="password" placeholder="password">
        </div>

        <div class="field-group">
            <label>Age</label>
            <input type="number" placeholder="age">
        </div>

        <div class="field-group">
            <label>Bio</label>
            <textarea placeholder="Write your Bio..." rows="5"></textarea>
        </div>
        <div class="field-group">
            <p><strong>SKILLS</strong></p><br>

            <label>
                <input type="checkbox" name="skill[]" value="html-css">
                HTML e CSS
            </label>

            <label>
                <input type="checkbox" name="skill[]" value="javascript">
                JAVASCRIPT
            </label>

            <label>
                <input type="checkbox" name="skill[]" value="python">
                PYTHON
            </label>
        </div>
        <br>
        <div class="field-group">
            <label>SELF-CONFIDENCE (0-100)</label>
            <input type="range" min="0" max="100" value="25" step="5">
        </div>

        <div class="field-group">
            <label>Escolha um arquivo:</label>
            <input type="file">
        </div>

        <br>
        <button type="submit" class="btn-submit">Submit</button>
        <button type="reset" class="btn-submit btn-clear">Clear</button>
        <button type="button" class="btn-submit btn-delete">Delete</button>

    </form>
</div>

</body>
</html>
